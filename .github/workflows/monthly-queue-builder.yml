name: Monthly Queue Builder

on:
  schedule:
    - cron: "0 8 1 * *"   # 1er de chaque mois à 8h UTC (après le keyword research si même jour)
  workflow_dispatch:

jobs:
  queue-builder:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Run queue builder agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: npx tsx scripts/agents/queue-builder-monthly.ts

      - name: Commit updated article queue
        run: |
          git config user.name "Vanzon Agent"
          git config user.email "agent@vanzonexplorer.com"
          git add scripts/data/article-queue.json
          git diff --staged --quiet || git commit -m "chore: queue enrichie — $(date +%B\ %Y) [skip ci]"
          git push
