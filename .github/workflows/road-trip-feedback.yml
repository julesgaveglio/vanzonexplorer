name: Road Trip Feedback — Email 24h

on:
  schedule:
    # Toutes les heures — détecte les road trips envoyés il y a exactement 24h
    - cron: "0 * * * *"
  workflow_dispatch: # déclenchement manuel depuis GitHub

jobs:
  send-feedback:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run road-trip-feedback agent
        run: npx tsx scripts/agents/road-trip-feedback-agent.ts
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NEXT_PUBLIC_SITE_URL: https://vanzonexplorer.com
