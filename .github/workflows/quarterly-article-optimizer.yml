name: Quarterly Article Optimizer

on:
  schedule:
    - cron: "0 7 15 2 *"   # 15 février 7h UTC
    - cron: "0 7 15 5 *"   # 15 mai 7h UTC
    - cron: "0 7 15 8 *"   # 15 août 7h UTC
    - cron: "0 7 15 11 *"  # 15 novembre 7h UTC
  workflow_dispatch:

jobs:
  article-optimizer:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Run article optimizer agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SANITY_API_WRITE_TOKEN: ${{ secrets.SANITY_API_WRITE_TOKEN }}
          NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID }}
          GOOGLE_GSC_CLIENT_ID: ${{ secrets.GOOGLE_GSC_CLIENT_ID }}
          GOOGLE_GSC_CLIENT_SECRET: ${{ secrets.GOOGLE_GSC_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: npx tsx scripts/agents/article-optimizer-quarterly.ts

      - name: Commit updated queue (lastSeoCheck timestamps)
        run: |
          git config user.name "Vanzon Agent"
          git config user.email "agent@vanzonexplorer.com"
          git add scripts/data/article-queue.json
          git diff --staged --quiet || git commit -m "chore: articles optimisés — $(date +%B\ %Y) [skip ci]"
          git push
