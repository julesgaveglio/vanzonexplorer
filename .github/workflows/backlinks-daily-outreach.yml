name: Backlinks Daily Outreach

on:
  # schedule:
  #   - cron: '30 7 * * 2-5'  # Mardi-Vendredi à 9h30 Paris (7h30 UTC) — DÉSACTIVÉ TEMPORAIREMENT
  workflow_dispatch:

jobs:
  daily-outreach:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - run: npx tsx scripts/agents/backlinks-daily-outreach.ts
        env:
          NEXT_PUBLIC_SUPABASE_URL:    ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY:   ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GOOGLE_GSC_CLIENT_ID:        ${{ secrets.GOOGLE_GSC_CLIENT_ID }}
          GOOGLE_GSC_CLIENT_SECRET:    ${{ secrets.GOOGLE_GSC_CLIENT_SECRET }}
          GOOGLE_GMAIL_REFRESH_TOKEN:  ${{ secrets.GOOGLE_GMAIL_REFRESH_TOKEN }}
          GROQ_API_KEY:                ${{ secrets.GROQ_API_KEY }}
          GROQ_API_KEY_2:              ${{ secrets.GROQ_API_KEY_2 }}
          GROQ_API_KEY_3:              ${{ secrets.GROQ_API_KEY_3 }}
          JINA_API_KEY:                ${{ secrets.JINA_API_KEY }}
          HUNTER_API_KEY:              ${{ secrets.HUNTER_API_KEY }}
          ZEROBOUNCE_API_KEY:          ${{ secrets.ZEROBOUNCE_API_KEY }}
          TELEGRAM_BOT_TOKEN:          ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:            ${{ secrets.TELEGRAM_CHAT_ID }}
