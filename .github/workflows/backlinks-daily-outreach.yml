name: Backlinks Daily Outreach

on:
  schedule:
    - cron: '0 9 * * *'  # Tous les jours à 9h UTC (y compris week-end)
  workflow_dispatch:

jobs:
  daily-outreach:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - run: npx tsx scripts/agents/backlinks-daily-outreach.ts
        env:
          NEXT_PUBLIC_SITE_URL:        ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_SUPABASE_URL:    ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY:   ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GOOGLE_GSC_CLIENT_ID:        ${{ secrets.GOOGLE_GSC_CLIENT_ID }}
          GOOGLE_GSC_CLIENT_SECRET:    ${{ secrets.GOOGLE_GSC_CLIENT_SECRET }}
          GOOGLE_GMAIL_REFRESH_TOKEN:  ${{ secrets.GOOGLE_GMAIL_REFRESH_TOKEN }}
          TELEGRAM_BOT_TOKEN:          ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:            ${{ secrets.TELEGRAM_CHAT_ID }}
