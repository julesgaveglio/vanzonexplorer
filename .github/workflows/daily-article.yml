name: Daily Blog Article
on:
  schedule:
    - cron: '0 11 * * *'   # 11h UTC = 12h Paris (heure d'hiver)
  workflow_dispatch:         # Déclenchement manuel possible

jobs:
  write-and-publish:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npx tsx scripts/agents/blog-writer-agent.ts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SANITY_API_WRITE_TOKEN: ${{ secrets.SANITY_API_WRITE_TOKEN }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          NEXT_PUBLIC_SANITY_PROJECT_ID: lewexa74
          NEXT_PUBLIC_SANITY_DATASET: production
          DATAFORSEO_LOGIN: ${{ secrets.DATAFORSEO_LOGIN }}
          DATAFORSEO_PASSWORD: ${{ secrets.DATAFORSEO_PASSWORD }}
      - name: Commit queue update
        run: |
          git config user.email "bot@vanzonexplorer.com"
          git config user.name "Vanzon Blog Bot"
          git add scripts/data/article-queue.json
          git diff --staged --quiet || git commit -m "chore: article publié [skip ci]"
          git push
