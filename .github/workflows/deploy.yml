name: CI — Type Check & Lint

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Le déploiement est géré automatiquement par Vercel à chaque push sur main.
# Ce workflow fait uniquement la vérification TypeScript et ESLint.

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: TypeScript type check
        run: npx tsc --noEmit
        env:
          NEXT_PUBLIC_SANITY_PROJECT_ID: lewexa74
          NEXT_PUBLIC_SANITY_DATASET: production
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          NEXT_PUBLIC_SITE_URL: https://vanzonexplorer.com
